name: CI — Build & DevSecOps checks

# Runs on every PR and push to main. Nothing here deploys anything —
# see deploy.yml for that. This workflow's only job is to fail loudly
# before bad code, leaked secrets, vulnerable dependencies, or unsafe
# infra changes reach main.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write # required for CodeQL to upload SARIF results

jobs:
  # ── Build & lint ────────────────────────────────────────────────────────
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Astro type check
        run: npx astro check

      - name: Build site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── SAST: static application security testing ───────────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ── Secret scanning ──────────────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — gitleaks checks past commits too

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency scanning ──────────────────────────────────────────────────
  dependencies:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      # Dependabot (configured in .github/dependabot.yml) handles ongoing
      # version bumps; this step is the PR-time gate.

  # ── IaC scanning ─────────────────────────────────────────────────────────
  iac:
    name: IaC scan (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec on terraform/
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false # a failed IaC scan blocks the merge, same as any other check

      - name: Terraform format check
        uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform fmt -check -recursive
